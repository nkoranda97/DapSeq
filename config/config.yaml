# ─────────────────────────────────────────────────────────────────────────────
# DAP-seq pipeline configuration
# ─────────────────────────────────────────────────────────────────────────────

samples:
  TF1:
    r1: null
    r2: null
  TF2:
    r1: null
    r2: null
  input_DNA:
    r1: null
    r2: null

# Input/control sample name — must match a key in samples above.
# Set to null to run without a control.
input_control: null

output_dir: null

# ── Genome ───────────────────────────────────────────────────────────────────
genome_ref: null

genome_size: null

# Path to GTF/GFF for HOMER annotatePeaks. Set to null to skip annotation.
gene_annotation: null

# ── Compute ──────────────────────────────────────────────────────────────────
threads: 8

# ── SLURM ────────────────────────────────────────────────────────────────────
slurm_partition: null
slurm_account: null

# ── Samtools ─────────────────────────────────────────────────────────────────
samtools:
  mapq: 10
  extra_merge: ""   # optional extra flags for samtools merge

# ── bowtie2 ──────────────────────────────────────────────────────────────────
bowtie2:
  extra: ""          # optional flags passed to bowtie2 align
  extra_build: ""    # optional flags passed to bowtie2-build

# ── bbduk / reformat (trim + subsample) ──────────────────────────────────────
bbduk:
  # Adapter file for bbduk ref=. null uses BBTools built-in adapters.
  # Use an absolute path for a custom file.
  adapters: null
  # Subsample to at most this many fragments per sample. null = no subsampling.
  max_frags: null
  # Memory for bbduk/reformat in GB (1 GB is reserved for the OS).
  mem_gb: 8
  extra: ""          # optional extra flags passed to bbduk.sh

# ── bamCompare ────────────────────────────────────────────────────────────────
bamcompare:
  bin_size: 80
  operation: ratio
  scale_factors_method: SES
  n: 1000
  extra: ""          # optional extra flags passed to bamCompare

# ── MACS3 ────────────────────────────────────────────────────────────────────
macs3:
  format: BAMPE
  extra: ""
  min_foldch: 2.0

# ── FIMO ─────────────────────────────────────────────────────────────────────
fimo:
  thresh: 1.0e-5
  extra: ""          # optional extra flags passed to fimo

# ── MEME ─────────────────────────────────────────────────────────────────────
meme:
  nmotifs: 2
  minw: 8
  maxw: 32
  mod: anr
  maxpeaks: 100
  summit_extend: 30
  extra: ""          # optional extra flags passed to meme

# ── FastQC ───────────────────────────────────────────────────────────────────
fastqc:
  extra: ""          # optional extra flags passed to fastqc

# ── MultiQC ──────────────────────────────────────────────────────────────────
multiqc:
  extra: ""          # optional extra flags passed to multiqc

# ── HOMER annotatePeaks ───────────────────────────────────────────────────────
homer:
  extra: ""          # optional extra flags passed to annotatePeaks.pl

# ── Per-rule resource overrides ───────────────────────────────────────────────
resources:
  bowtie2_index:
    mem_mb: 8000
    runtime: 60
  trim_align:
    mem_mb: 16000
    runtime: 120
  fastqc:
    mem_mb: 2000
    runtime: 30
  multiqc:
    mem_mb: 2000
    runtime: 30
  bowtie2:
    mem_mb: 16000
    runtime: 120
  samtools_filter_sort:
    mem_mb: 8000
    runtime: 60
  bamcoverage:
    mem_mb: 8000
    runtime: 60
  bamcompare:
    mem_mb: 8000
    runtime: 60
  macs3:
    mem_mb: 8000
    runtime: 60
  filter_peaks:
    mem_mb: 1000
    runtime: 10
  narrow_peak_to_fasta:
    mem_mb: 4000
    runtime: 30
  meme:
    mem_mb: 8000
    runtime: 120
  fimo:
    mem_mb: 8000
    runtime: 60
  alignment_stats:
    mem_mb: 4000
    runtime: 30
  filtered_stats:
    mem_mb: 4000
    runtime: 30
  frip_macs:
    mem_mb: 4000
    runtime: 30
  qc_summary:
    mem_mb: 2000
    runtime: 10
  update_db:
    mem_mb: 1000
    runtime: 5
  merge_control:
    mem_mb: 8000
    runtime: 60
  homer_annotate:
    mem_mb: 4000
    runtime: 30
