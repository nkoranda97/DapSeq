# Input/control sample name — must match a key in samples above.
# Set to null to run without a control.

input_control: control
output_dir: /project/zhuzhuzhang/nick/DapSeq/results/human/pinky_v2

# ── Genome ───────────────────────────────────────────────────────────────────
genome_ref: /project/gzy8899/references/Homo_sapiens/Homo_sapiens.GRCh38.dna.primary_assembly.fa
genome_size: "3000000000"

# Path to GTF/GFF for HOMER annotatePeaks. Set to null to skip annotation.
gene_annotation: /project/gzy8899/references/Homo_sapiens/Homo_sapiens.GRCh38.113.gtf

# ── Compute ──────────────────────────────────────────────────────────────────
threads: 8

# ── SLURM ────────────────────────────────────────────────────────────────────
slurm_partition: "caslake"
slurm_account: "pi-zhuzhuzhang"

bbduk:
  adapters: null
  max_frags: null
  mem_gb: 8
  k: 21
  mink: 11
  ktrim: r # r=right, l=left, lr=both
  qtrim: r # r=right, l=left, lr=both, w=window
  trimq: 6
  maq: 10
  ow: t # t=overwrite, f=fail if output exists
  extra: ""

fastqc:
  extra: ""

bowtie2:
  extra: ""
  extra_build: ""

samtools:
  mapq: 10
  extra_merge: ""

bamcoverage:
  normalize_using: RPGC
  bin_size: 1
  ignore_duplicates: true
  max_fragment_length: 600 # PE only
  extend_reads: true # PE only
  extra: ""

bamcompare:
  bin_size: 80
  operation: ratio
  scale_factors_method: SES
  n: 1000
  extra: ""

macs3:
  format: BAMPE
  min_foldch: 2.0
  keep_dup: 1
  extra: ""

meme:
  nmotifs: 2
  minw: 8
  maxw: 32
  mod: anr
  maxpeaks: 100
  maxsize: 10000000
  summit_extend: 30
  extra: ""

fimo:
  thresh: 1.0e-5
  extra: ""

homer:
  extra: ""

multiqc:
  extra: ""

# ── Per-rule resource overrides ───────────────────────────────────────────────
